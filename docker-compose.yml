services:
  db:
    image: postgres:16-alpine
    restart: always
    environment:
      - POSTGRES_USER=perps_user
      - POSTGRES_PASSWORD=mysecretpasswordfordb
      - POSTGRES_DB=perps_db
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: perps_redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data

volumes:
  db_data:
  redisdata:
